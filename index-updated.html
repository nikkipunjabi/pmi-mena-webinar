<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Webinar...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .webinar-title {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .backup-link {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .backup-link:hover {
            background: white;
            color: #667eea;
        }
        .error {
            background: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting to Webinar...</h1>
        <div class="webinar-title" id="webinarTitle">Loading...</div>
        <p>You'll be redirected in a moment</p>
        <a href="#" id="backupLink" class="backup-link" style="display:none;">
            Click here if not redirected automatically
        </a>
        <div id="errorMessage" style="display:none;"></div>
    </div>

    <script>
        // Configuration - REPLACE THIS URL with your Google Apps Script Web App URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz56m9xa9x0ortgnvcBiEOUGjbkCZK31nXnPWWI0BHcI1qoEOyLzEo8gsDNCMvxG-iDVA/exec';
        
        // Webinar mappings - This will be your source of truth
        const WEBINAR_MAP = {
            'ai-in-action': {
                title: 'AI in Action',
                url: 'https://pmi-org.zoom.us/webinar/register/WN_WdaRj3MwQGSYds9UkPeuaQ#/registration'
            },
            'ai-agents-in-detail': {
                title: 'AI Agents in Detail',
                url: 'https://ev.zoom.com/webinars-events/from-meetings-to-classrooms-zoom-ai-companion-in-practice/'
            },
            'pmo-leaders-executive-table': {
                title: 'How PMO Leaders Earn (and Keep) Their Seat at the Executive Table',
                url: 'https://us02web.zoom.us/webinar/register/WN_7TPMVKg7RmKVXBCcCTAjFA'
            }
        };

        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const webinarId = urlParams.get('id') || '';
        const source = urlParams.get('source') || 'direct';

        // Find the webinar
        const webinar = WEBINAR_MAP[webinarId];

        if (!webinar) {
            // Show error if webinar not found
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('h1').textContent = 'Webinar Not Found';
            document.getElementById('webinarTitle').textContent = 'Invalid webinar link';
            document.getElementById('errorMessage').innerHTML = `
                <div class="error">
                    <strong>Error:</strong> The webinar link you followed is invalid or has expired.
                    <br><br>
                    Please contact the person who shared this link.
                </div>
            `;
            document.getElementById('errorMessage').style.display = 'block';
        } else {
            // Show webinar title
            document.getElementById('webinarTitle').textContent = webinar.title;
            
            // Set backup link
            const backupLink = document.getElementById('backupLink');
            backupLink.href = webinar.url;
            backupLink.style.display = 'inline-block';

            // Collect tracking data
            const trackingData = {
                timestamp: new Date().toISOString(),
                webinarId: webinarId,
                webinarTitle: webinar.title,
                targetUrl: webinar.url,
                source: source,
                userAgent: navigator.userAgent,
                referrer: document.referrer || 'none',
                language: navigator.language,
                screenSize: `${screen.width}x${screen.height}`
            };

            // Send tracking data to Google Sheets
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(trackingData)
            }).then(() => {
                console.log('Tracking logged');
            }).catch(err => {
                console.log('Tracking failed, but continuing redirect:', err);
            }).finally(() => {
                // Redirect after 1.5 seconds regardless of tracking success
                setTimeout(() => {
                    window.location.href = webinar.url;
                }, 1500);
            });
        }
    </script>
</body>
</html>
